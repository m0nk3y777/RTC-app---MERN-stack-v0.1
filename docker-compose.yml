services:
  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_DEFAULT_BUCKET=${MINIO_DEFAULT_BUCKET}
    networks:
      - mynet:
          aliases:
            - my-localhost
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
      
    command: [ "server", "--console-address", ":9001", "/data" ]

volumes:
  minio_data:

networks:
  mynet: