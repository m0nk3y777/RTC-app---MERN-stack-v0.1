name: Server CI

on:
  push:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js lts/*
      uses: actions/setup-node@v4
      with:
        node-version: "lts/*"
        cache: "npm"
        cache-dependency-path: backend/package-lock.json
    - run: npm ci
      working-directory: backend
    - run : echo "L'environnement est setup"
